<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador Oficial AnGaPo v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:#fff;
    padding:20px;
}

h2{margin-bottom:5px;}
small{color:#94a3b8;}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    font-size:14px;
}

.opcion-linea{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.opcion-linea input[type="radio"]{
    width:auto;
    transform:scale(1.3);
    cursor:pointer;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

.btn-add{background:#2563eb;color:#fff;}
.btn-download{background:#22c55e;color:#000;}
.btn-clear{background:#dc2626;color:#fff;}

pre{
    background:#020617;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    white-space:pre-wrap;
    max-height:400px;
    overflow:auto;
}
</style>
</head>

<body>

<h2>🔥 Generador Oficial AnGaPo v2</h2>
<small>Compatible con sistema aleatorio profesional</small>

<input id="tituloExamen" placeholder="Título del examen (Ej: 01 - Código de Justicia Militar)">

<input id="art" placeholder="Artículo (Ej: Art. 25)">
<textarea id="pregunta" rows="3" placeholder="Escribe la pregunta"></textarea>

<div class="opcion-linea">
    <input type="radio" name="correcta" value="0" onclick="seleccionar(0)">
    <input id="op0" placeholder="Opción A">
</div>

<div class="opcion-linea">
    <input type="radio" name="correcta" value="1" onclick="seleccionar(1)">
    <input id="op1" placeholder="Opción B">
</div>

<div class="opcion-linea">
    <input type="radio" name="correcta" value="2" onclick="seleccionar(2)">
    <input id="op2" placeholder="Opción C">
</div>

<div class="opcion-linea">
    <input type="radio" name="correcta" value="3" onclick="seleccionar(3)">
    <input id="op3" placeholder="Opción D">
</div>

<button class="btn-add" onclick="agregar()">Agregar pregunta</button>
<button class="btn-download" onclick="descargarJS()">Descargar archivo .js</button>
<button class="btn-clear" onclick="borrarTodo()">Borrar todo</button>

<pre id="resultado"></pre>

<script>

let correcta = null;
let banco = JSON.parse(localStorage.getItem("bancoAnGaPo")) || [];

/* ===== SELECCIONAR RESPUESTA CORRECTA ===== */
function seleccionar(valor){
    correcta = valor;
}

/* ===== AGREGAR PREGUNTA ===== */
function agregar(){

    const titulo = document.getElementById("tituloExamen").value.trim();
    const art = document.getElementById("art").value.trim();
    const pregunta = document.getElementById("pregunta").value.trim();

    const opciones = [
        document.getElementById("op0").value.trim(),
        document.getElementById("op1").value.trim(),
        document.getElementById("op2").value.trim(),
        document.getElementById("op3").value.trim()
    ];

    if(!titulo || !art || !pregunta || opciones.some(o=>!o) || correcta===null){
        alert("Completa todo y selecciona la correcta");
        return;
    }

    banco.push({
        art: art,
        q: pregunta,
        o: opciones,
        a: correcta
    });

    localStorage.setItem("bancoAnGaPo", JSON.stringify(banco));

    generarSalida();
    limpiarCampos();
}

/* ===== GENERAR BLOQUE FINAL ===== */
function generarSalida(){

    const titulo = document.getElementById("tituloExamen").value.trim();

    let texto = `const tituloExamen = "${titulo}";

const preguntas = [

`;

    banco.forEach((p,i)=>{

        texto += `{
art:"${p.art}",
q:"${p.q}",
o:[
"${p.o[0]}",
"${p.o[1]}",
"${p.o[2]}",
"${p.o[3]}"
],
a:${p.a}
}`;

        if(i < banco.length-1) texto += ",";

        texto += "\n\n";
    });

    texto += "];";

    document.getElementById("resultado").textContent = texto;
}

/* ===== DESCARGAR JS ===== */
function descargarJS(){

    const contenido = document.getElementById("resultado").textContent;

    if(!contenido){
        alert("No hay examen generado");
        return;
    }

    const blob = new Blob([contenido], {type:"application/javascript"});
    const enlace = document.createElement("a");

    const nombre = prompt("Nombre del archivo (ej: examen1):");

    if(!nombre) return;

    enlace.href = URL.createObjectURL(blob);
    enlace.download = nombre + ".js";
    enlace.click();
}

/* ===== LIMPIAR CAMPOS ===== */
function limpiarCampos(){
    document.getElementById("art").value="";
    document.getElementById("pregunta").value="";
    document.getElementById("op0").value="";
    document.getElementById("op1").value="";
    document.getElementById("op2").value="";
    document.getElementById("op3").value="";

    document.querySelectorAll("input[type='radio']")
    .forEach(r=>r.checked=false);

    correcta = null;
}

/* ===== BORRAR TODO ===== */
function borrarTodo(){
    if(confirm("¿Seguro que quieres borrar todo el banco?")){
        banco = [];
        localStorage.removeItem("bancoAnGaPo");
        document.getElementById("resultado").textContent="";
    }
}

</script>

</body>
</html>
