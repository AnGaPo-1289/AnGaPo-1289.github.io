<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Demo - AnGaPo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/examen.css">

</head>

<body>

<header id="title">Demo de examen</header>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">

<div id="quizArea">

<button class="btn-finish" onclick="finishExam()">
Finalizar demo
</button>

<div class="card" id="questionBox"></div>

<div id="optionsBox"></div>

<div class="info">
✅ Correctas: <span id="ok">0</span><br>
❌ Incorrectas: <span id="bad">0</span><br>
⏳ Faltantes: <span id="left">0</span>
</div>

<button class="btn-primary hidden" id="nextBtn" onclick="nextQuestion()">
Siguiente
</button>

</div>

<div id="resultArea" class="hidden">

<div id="resultBox" class="result-box"></div>

<div id="review"></div>

<div style="text-align:center;margin-top:20px;">

<h3>Este fue solo un DEMO</h3>

<p>
Para acceder a todos los exámenes y más de 500 preguntas
suscríbete al canal.
</p>

<a href="instrucciones.html" class="btn-primary">Ver instrucciones</a>

</div>

</div>

</div>

<script src="js/demo.js"></script>
<script src="js/motor.js"></script>

</body>
</html>
