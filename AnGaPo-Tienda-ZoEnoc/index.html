<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Tienda</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<div class="barra">

<div class="logo">
<img src="logo.png" alt="Mi Tienda">
</div>

<input type="text" id="buscador" placeholder="🔎 Buscar producto..." class="buscador">

<div class="carrito-barra">

<div onclick="toggleCarrito()" style="cursor:pointer">
🛒 Carrito (<span id="contadorCarrito">0</span>)
</div>

<button onclick="enviarPedido()" class="btn-enviar">
Enviar pedido
</button>

</div>

</div>

<div class="categorias" id="categorias"></div>

<div class="filtros">

<button id="btnTodos" onclick="filtrar('todos')">Todos</button>
<button id="btnOfertas" onclick="filtrar('oferta')">🔥 Ofertas</button>
<button id="btnNuevos" onclick="filtrar('nuevo')">🆕 Nuevos</button>
<button id="btnAgotados" onclick="filtrar('agotado')">❌ Agotados</button>

</div>

<div class="tienda"></div>


<!-- CARRITO DESPLEGABLE -->

<div class="carrito-desplegable" id="carritoLista">

<h3>🛒 Tu carrito</h3>

<div id="itemsCarrito"></div>

<div class="totalCarrito">
Total: $<span id="totalCarrito">0</span>
</div>

<button onclick="enviarPedido()" class="btn-enviar">
Enviar pedido
</button>

</div>


<!-- Modal imagen -->

<div class="modal" id="modal">
<img id="imagenGrande">
</div>


<!-- Botón flotante WhatsApp -->

<a class="whatsapp-float"
href="https://wa.me/525548152810?text=Hola%20quiero%20informacion%20sobre%20los%20productos"
target="_blank">
💬
</a>

<script src="tienda.js"></script>

</body>
</html>
